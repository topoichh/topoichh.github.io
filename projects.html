<style>

body {

/* =========================
   UPD 2026: Liquid Glass
   ========================= */

.controls button,
.project-btn,
.back-btn {

  position: relative;
  display: inline-block;
  margin: 8px;
  padding: 10px 22px;

  font-size: 0.95rem;
  color: #fff;
  text-decoration: none;

  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);

  background: rgba(255,255,255,0.04);

  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.15),
    inset 0 -1px 0 rgba(255,255,255,0.05),
    0 8px 20px rgba(0,0,0,0.35);

  cursor: pointer;
  transition: all 0.25s ease;
  overflow: hidden;
}

/* hover glow */

.controls button::after,
.project-btn::after,
.back-btn::after {

  content: "";
  position: absolute;
  inset: -1px;

  border-radius: 16px;

  background: linear-gradient(
    135deg,
    #a855ff,
    #7c3aed,
    #c084fc
  );

  opacity: 0;
  z-index: -1;
  transition: 0.3s ease;
}

.controls button:hover,
.project-btn:hover,
.back-btn:hover {
  transform: translateY(-2px);
}

.controls button:hover::after,
.project-btn:hover::after,
.back-btn:hover::after {

  opacity: 1;

  box-shadow:
    0 0 10px rgba(168,85,255,0.6),
    0 0 25px rgba(168,85,255,0.4);
}

/* =========================
   search bar better be more like useless bar :sob:
   ========================= */

.search-wrapper {

.search-bar {

<script>

/* SEARCH */

function searchProjects() {

let input = document.querySelector(".search-bar").value.toLowerCase();
let projects = document.querySelectorAll(".project-btn");

projects.forEach(project => {

let text = project.innerText.toLowerCase();

project.style.display = text.includes(input) ? "block" : "none";

});

}

/* style settings */

let CURRENT_STYLE = "topoichh";

const STYLES = {
  topoichh: {
    letters: "topoichh",
    color: "#a855ff"
  },
  matrix: {
    letters: "01",
    color: "#0f0"
  }
};

/* canvas = must be */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* snow */

let particles = [];

function createParticles() {

particles = [];

for (let i = 0; i < 120; i++) {

particles.push({
x: Math.random() * canvas.width,
y: Math.random() * canvas.height,
size: Math.random() * 2 + 1,
speedY: Math.random() * 0.8 + 0.2,
speedX: Math.random() * 0.5 - 0.25
});

}

}

createParticles();

function drawSnow() {

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,255,255,0.8)";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y+=p.speedY;
p.x+=p.speedX;

if(p.y>canvas.height){

p.y=0;
p.x=Math.random()*canvas.width;

}

});

}

/* matrix */

const fontSize=16;
let columns=Math.floor(canvas.width/fontSize);
let drops=[];

function resetDrops(){

columns=Math.floor(canvas.width/fontSize);
drops=[];

for(let i=0;i<columns;i++){

drops[i]=Math.random()*canvas.height;

}

}

resetDrops();

function drawLetters(style){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=style.color;
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=
style.letters[
Math.floor(Math.random()*style.letters.length)
];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){

drops[i]=0;

}

drops[i]++;

}

}

/* switch styles javascript */

function setStyle(style){

CURRENT_STYLE=style;

if(style==="snow"){
createParticles();
}else{
resetDrops();
}

}

/* loop */

function draw(){

if(CURRENT_STYLE==="snow"){
drawSnow();
}else if(CURRENT_STYLE==="matrix"){
drawLetters(STYLES.matrix);
}else{
drawLetters(STYLES.topoichh);
}

}

setInterval(draw,33);

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

createParticles();
resetDrops();

});

</script>
