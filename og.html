<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>topoichh</title>

<style>
body {
  margin: 0;
  background: #0c0c12;
  overflow: hidden;
  font-family: sans-serif;
  color: #fff;
}

  .projects-btn {
  display: block;
  margin: 30px auto;
  padding: 18px 40px;
  font-size: 1.3rem;
  color: #fff;
  text-decoration: none;
  border-radius: 14px;
  background: rgba(140, 0, 255, 0.15);
  border: 1px solid rgba(160, 80, 255, 0.6);

  box-shadow:
    0 0 10px #8a2cff,
    0 0 20px #8a2cff,
    inset 0 0 10px #8a2cff;

  transition: 0.3s ease;
}

.projects-btn:hover {
  transform: translateY(-3px) scale(1.02);

  box-shadow:
    0 0 20px #a855ff,
    0 0 40px #a855ff,
    0 0 60px #a855ff,
    inset 0 0 15px #a855ff;

  background: rgba(160, 80, 255, 0.2);
}
  
/* PARTICLES CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* MAIN UI */
.content-wrapper {
  position: relative;
  z-index: 2;
  max-width: 680px;
  margin: 80px auto;
  padding: 50px;
  background: rgba(20,20,26,0.7);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  text-align: center;
}

.profile-photo {
  width: 100px;
  border-radius: 20px;
  margin-bottom: 20px;
}

h1 {
  font-size: 2.5rem;
  background: linear-gradient(135deg,#fff,#a0a0ff);
  -webkit-background-clip: text;
  color: transparent;
}

p {
  color: #aaa;
}
</style>
</head>

<body>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<div class="content-wrapper">
  <img src="https://avatars.fastly.steamstatic.com/018c9ed379616eb68b8fa8766424ea132760d347_full.jpg" class="profile-photo">
  <h1>topoichh</h1>
  <p>a.k.a doggy // jsprcha</p>
  <p>All rights reserved, 2025.</p>
  <a href="projects.html" class="projects-btn">
  My Projects
</a>
</div>

<!-- LOAD JS AT END -->
<script src="script.js"></script>

</body>
</html>
