canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;

  position: relative;
  z-index: 2;
  max-width: 680px;
  margin: 80px auto;
  padding: 50px;
  background: rgba(20,20,26,0.7);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  text-align: center;
}

.profile-photo {
  width: 100px;
  border-radius: 20px;
  margin-bottom: 20px;
}

h1 {
  font-size: 2.5rem;
  background: linear-gradient(135deg,#fff,#a0a0ff);
  -webkit-background-clip: text;
  color: transparent;
}

p {

}
