<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>topoichh</title>
<script src="script.js"></script>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: monospace;
  color: #0f0;
}

/* MATRIX CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* CONTENT */
.content {
  position: relative;
  z-index: 2;
  max-width: 600px;
  margin: 100px auto;
  padding: 40px;
  background: rgba(0, 0, 0, 0.6);
  border-radius: 15px;
  backdrop-filter: blur(10px);
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  color: #0f0;
}

/* BUTTON */
.btn {
  margin-top: 40px;
  display: inline-block;
  padding: 18px 30px;
  border: 1px solid #0f0;
  border-radius: 12px;
  text-decoration: none;
  color: #0f0;
  font-size: 1.3rem;
  transition: 0.3s;
}

/* NEON GLOW */
.btn:hover {
  box-shadow:
    0 0 10px #0f0,
    0 0 30px #0f0,
    0 0 60px #0f0;
  transform: scale(1.05);
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="content">
  <h1>topoichh</h1>
  <p>a.k.a doggy // jsprcha</p>

  <a href="https://topoichh.github.io/projects" class="btn">
    ▶ My Projects
  </a>
</div>

<script>
/* =========================
   MATRIX RAIN EFFECT
   ========================= */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* 🔧 CUSTOMIZE HERE */
const letters = "topoichh01アイウエオABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];

// initialize drops
for (let i = 0; i < columns; i++) {
  drops[i] = Math.random() * canvas.height;
}

function draw() {
  // translucent background (trail effect)
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];

    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    // reset randomly
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);

/* RESPONSIVE */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
