<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>topoichh</title>

<style>

body {
  margin: 0;
  background: #0c0c12;
  overflow: hidden;
  font-family: sans-serif;
  color: #fff;
}

/* =========================
   2026 UPD: Liquid Glass (iOS flex or what lmao idk)
   ========================= */

.controls {
  margin: 20px 0;
}

.controls button,
.projects-btn {

  position: relative;
  display: inline-block;
  margin: 6px;
  padding: 10px 22px;

  font-size: 0.95rem;
  color: #fff;
  text-decoration: none;

  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);

  background: rgba(255,255,255,0.04);

  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.15),
    inset 0 -1px 0 rgba(255,255,255,0.05),
    0 8px 20px rgba(0,0,0,0.35);

  cursor: pointer;
  transition: all 0.25s ease;

  overflow: hidden;
}

/* glass reflection */
.controls button::before,
.projects-btn::before {

  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50%;

  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.25),
    rgba(255,255,255,0.05),
    transparent
  );

  border-radius: inherit;
  opacity: 0.35;
}

/* neon gradient border */
.controls button::after,
.projects-btn::after {

  content: "";
  position: absolute;
  inset: -1px;

  border-radius: 16px;

  background: linear-gradient(
    135deg,
    #a855ff,
    #7c3aed,
    #c084fc
  );

  opacity: 0;
  z-index: -1;
  transition: 0.3s ease;
}

/* hover effect */
.controls button:hover,
.projects-btn:hover {

  transform: translateY(-2px);

  background: rgba(255,255,255,0.06);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.2),
    inset 0 -1px 0 rgba(255,255,255,0.08),
    0 12px 30px rgba(0,0,0,0.45);
}

/* purple glow only on hover */
.controls button:hover::after,
.projects-btn:hover::after {

  opacity: 1;

  box-shadow:
    0 0 10px rgba(168,85,255,0.6),
    0 0 25px rgba(168,85,255,0.4),
    0 0 50px rgba(168,85,255,0.25);
}

/* =========================
   canvas
   ========================= */

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* =========================
   about
   ========================= */

.content-wrapper {
  position: relative;
  z-index: 2;
  max-width: 680px;
  margin: 80px auto;
  padding: 50px;
  background: rgba(20,20,26,0.65);
  backdrop-filter: blur(18px);
  border-radius: 20px;
  text-align: center;
}

.profile-photo {
  width: 100px;
  border-radius: 20px;
  margin-bottom: 20px;
}

h1 {
  font-size: 2.5rem;
  background: linear-gradient(135deg,#fff,#a0a0ff);
  -webkit-background-clip: text;
  color: transparent;
}

p {
  color: #aaa;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="content-wrapper">

<img src="https://avatars.fastly.steamstatic.com/018c9ed379616eb68b8fa8766424ea132760d347_full.jpg" class="profile-photo">

<h1>topoichh</h1>

<p>a.k.a doggy // jsprcha | settings of styles won't be saved. working on that</p>

<div class="controls">
<button onclick="setStyle('topoichh')">Topoichh</button>
<button onclick="setStyle('snow')">Snow</button>
<button onclick="setStyle('matrix')">Matrix</button>
</div>

<a href="projects.html" class="projects-btn">My Projects</a>

<p>All rights reserved, 2025.</p>

</div>

<script>

/* customizable style settings idk what ts code about */

let CURRENT_STYLE = "topoichh";

const STYLES = {
  topoichh: {
    letters: "topoichh",
    color: "#a855ff"
  },
  matrix: {
    letters: "01",
    color: "#0f0"
  }
};

/* setup */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* snow */

let particles = [];

function createParticles() {
  particles = [];

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 1,
      speedY: Math.random() * 0.8 + 0.2,
      speedX: Math.random() * 0.5 - 0.25
    });
  }
}

createParticles();

function drawSnow() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "rgba(255,255,255,0.8)";

  particles.forEach(p => {

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    p.y += p.speedY;
    p.x += p.speedX;

    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }

  });

}

/* topoichh */

const fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = [];

function resetDrops() {

  columns = Math.floor(canvas.width / fontSize);
  drops = [];

  for (let i = 0; i < columns; i++) {
    drops[i] = Math.random() * canvas.height;
  }

}

resetDrops();

function drawLetters(style) {

  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = style.color;
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {

    const text =
      style.letters[
        Math.floor(Math.random() * style.letters.length)
      ];

    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;

  }

}

/* customization styles */

function setStyle(style) {

  CURRENT_STYLE = style;

  if (style === "snow") {
    createParticles();
  } else {
    resetDrops();
  }

}

/* loop styles */

function draw() {

  if (CURRENT_STYLE === "snow") {
    drawSnow();
  } else if (CURRENT_STYLE === "matrix") {
    drawLetters(STYLES.matrix);
  } else {
    drawLetters(STYLES.topoichh);
  }

}

setInterval(draw, 33);

/* resize */

window.addEventListener("resize", () => {

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  createParticles();
  resetDrops();

});

</script>

</body>
</html>
